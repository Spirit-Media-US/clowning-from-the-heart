[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PUBLIC_SITE_URL = "https://clowningfromtheheart.com"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://analytics.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://cdn.sanity.io https://www.google-analytics.com https://assets.spiritmediapublishing.com data:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com; frame-src https://www.youtube.com"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/static/*"
  to = "/studio/static/:splat"
  status = 200

[[redirects]]
  from = "https://www.clowningfromtheheart.com/*"
  to = "https://clowningfromtheheart.com/:splat"
  status = 301
  force = true

# Deploy Previews for PRs (#43)
[context.deploy-preview]
  command = "bun run build"

[context.deploy-preview.environment]
  PUBLIC_SITE_URL = "https://deploy-preview--clowningfromtheheart.netlify.app"

[context.branch-deploy]
  command = "bun run build"
